apiVersion: v1
kind: Secret
metadata:
  name: wx1-dns01-auth
  namespace: cert-manager
type: Opaque
stringData:
  username: your-api-key-id
  password: your-api-key-secret
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-wx1
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com
    privateKeySecretRef:
      name: letsencrypt-wx1-account-key
    solvers:
      - selector:
          dnsZones:
            - test123.de
        dns01:
          webhook:
            groupName: acme.wx1.eu
            solverName: wx1
            config:
              host: https://cmd.wx1.eu/api
              authCacheTTL: 4h
              authSecretRef:
                name: wx1-dns01-auth
                namespace: cert-manager
